name: Frontend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'sigq/frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'sigq/frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'sigq/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: sigq/frontend
        run: npm ci

      - name: Lint
        working-directory: sigq/frontend
        run: npm run lint

      - name: Type check
        working-directory: sigq/frontend
        run: npm run type-check

      - name: Build
        working-directory: sigq/frontend
        run: npm run build
