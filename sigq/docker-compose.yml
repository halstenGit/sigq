version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sigq-postgres
    environment:
      POSTGRES_USER: sigq
      POSTGRES_PASSWORD: sigq-dev-password
      POSTGRES_DB: sigq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigq"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

# Para usar: docker-compose up -d
# DATABASE_URL para .env: postgresql://sigq:sigq-dev-password@localhost:5432/sigq
